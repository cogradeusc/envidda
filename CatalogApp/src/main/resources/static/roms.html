<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Lendas - ROMS data query</title>
    <link rel="icon" type="image/x-icon" href="favico.png">

    <!-- Resource hints for performance -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/data-display.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/models.css">
    <link rel="stylesheet" href="css/observation-common.css">
    <link rel="stylesheet" href="css/availability-timeline.css">
    </head>

<body>
    <main>
        <header class="page-hero">
            <div class="page-hero__content">
                <h1 id="page-title">ROMS data query</h1>
            </div>
            <div class="page-hero__actions">
                <a class="page-hero__link" id="back-link" href="process-type.html?schema=roms_meteogalicia&name=modelo_roms" aria-label="Back to process">
                    ← Back to process
                </a>
            </div>
        </header>

        <form id="search-form">
            <div class="field field--map">
                <div class="map-panel">
                    <div id="map" class="map-container"></div>
                </div>
                <div class="map-controls">
                    <button type="button" id="clear-bbox" class="map-control-btn">Clear BBOX</button>
                    <div id="bbox-display" class="bbox-display"></div>
                </div>
            </div>

            <div class="field-group">
                <div class="field">
                    <label for="start-date">Start date</label>
                    <input id="start-date" name="start-date" type="datetime-local" value="2000-01-01T00:00" required>
                </div>
                <div class="field">
                    <label for="end-date">End date</label>
                    <input id="end-date" name="end-date" type="datetime-local" value="2050-01-01T00:00" required>
                </div>
            </div>

            <div class="field">
                <label for="procedures">Processes</label>
                <input id="procedures" name="procedures" type="text" placeholder="E.g. 1,2,3" pattern="^[0-9,\s]+$" title="Enter comma-separated numeric IDs">
            </div>

            <button type="submit" id="search-button">Search ROMS data</button>
            <div id="status"></div>
        </form>

        <section id="results" aria-live="polite" aria-busy="false">
            <div id="availability-container"></div>
            <div id="results-container">
                <div class="empty-state">Configure the filters and press "Search ROMS data" to get results.</div>
            </div>
        </section>
    </main>

    
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>    
    <script defer src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script defer src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script defer src="https://unpkg.com/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>

    <div id="feature-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="feature-modal-title" hidden>
        <div class="modal__backdrop" data-modal-dismiss></div>
        <div class="modal__dialog">
            <header class="modal__header">
                <h2 id="feature-modal-title">Observation detail</h2>
                <button type="button" class="modal__close" data-modal-dismiss aria-label="Close">×</button>
            </header>
            <div class="modal__content" id="feature-modal-content"></div>
        </div>
    </div>

    <div id="roms-wcs-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="roms-wcs-modal-title" hidden>
        <div class="modal__backdrop" data-modal-dismiss></div>
        <div class="modal__dialog modal__dialog--wcs">
            <header class="modal__header">
                <h2 id="roms-wcs-modal-title">ROMS WCS visualization</h2>
                <button type="button" class="modal__close" data-modal-dismiss aria-label="Close">×</button>
            </header>
            <div class="modal__content">
                <div class="wcs-layout">
                    <div class="wcs-filters">
                        <h3 class="wcs-filters__title">Filters</h3>

                        <div class="wcs-filter-group">
                            <label for="roms-wcs-layer">Variable</label>
                            <select id="roms-wcs-layer" class="wcs-select"></select>
                        </div>

                        <div class="wcs-filter-group">
                            <label for="roms-wcs-time">Time</label>
                            <select id="roms-wcs-time" class="wcs-select"></select>
                        </div>

                        <div class="wcs-filter-group">
                            <label for="roms-wcs-depth">Depth</label>
                            <select id="roms-wcs-depth" class="wcs-select"></select>
                        </div>

                        <div class="wcs-filter-group wcs-filter-group--map">
                            <label>Area of interest (BBOX)</label>
                            <div id="roms-wcs-filter-map" class="wcs-filter-map"></div>
                            <div class="wcs-map-info">
                                <button type="button" id="roms-wcs-clear-bbox" class="wcs-control-btn">Clear BBOX</button>
                                <div id="roms-wcs-bbox-display" class="wcs-bbox-display">
                                    <em>Draw a rectangle on the map</em>
                                </div>
                            </div>
                        </div>

                        <div class="wcs-status" id="roms-wcs-status"></div>
                    </div>

                    <div class="wcs-results">
                        <h3 class="wcs-results__title">Result</h3>
                        <div id="roms-wcs-result-map" class="wcs-result-map"></div>
                        <div id="roms-wcs-value-display" class="wcs-value-display" aria-live="polite">Value: —</div>
                        <div class="wcs-legend" id="roms-wcs-legend"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
        <script src="js/shared/logger.js" defer></script>
    <script src="js/shared/i18n.js" defer></script>
    <script src="js/modules/ApiService.js" defer></script>
    <script defer src="js/utils.js"></script>
    <script defer src="js/notifications.js"></script>
    <script defer src="js/shared/constants.js"></script>
    <script defer src="js/shared/dom-helpers.js"></script>
    <script defer src="js/shared/map-manager.js"></script>
    <script defer src="js/shared/wcs-ui.js"></script>
    <script defer src="js/shared/wcs-raster.js"></script>
    <script defer src="js/shared/availability-renderer.js"></script>
    <script defer src="js/shared/modal-manager.js"></script>
    <script defer src="js/shared/chart-helpers.js"></script>
    <script defer src="js/shared/wfs-client.js"></script>
    <script defer src="js/shared/csv-exporter.js"></script>
    <script defer src="js/roms.js"></script>
</body>

</html>
