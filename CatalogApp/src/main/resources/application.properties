spring.application.name=lendas
spring.application.version=@project.version@

spring.datasource.url=${LENDAS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ccmm}
spring.datasource.username=${LENDAS_DATASOURCE_USERNAME:ccmm}
spring.datasource.password=${LENDAS_DATASOURCE_PASSWORD:ccmm2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

server.port=${PORT:8080}
server.forward-headers-strategy=framework
spring.main.banner-mode=console
spring.jackson.serialization.indent_output=true
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jackson.time-zone=UTC
spring.jackson.property-naming-strategy=SNAKE_CASE

management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

logging.level.org.springframework=INFO
logging.level.org.example.lendas=INFO

spring.profiles.default=dev

