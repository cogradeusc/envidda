lendas.geoserver.base-url=${LENDAS_GEOSERVER_BASE_URL}
lendas.geoserver.wcs-url=${LENDAS_GEOSERVER_WCS_URL}
lendas.geoserver.wms-url=${LENDAS_GEOSERVER_WMS_URL}

lendas.security.allowed-origin-patterns=${LENDAS_ALLOWED_ORIGIN_PATTERNS:}
lendas.security.enable-cache-admin=false

lendas.cache.process-types.ttl-seconds=${LENDAS_CACHE_PROCESS_TYPES_TTL:3600}
lendas.cache.process-types.max-entries=${LENDAS_CACHE_PROCESS_TYPES_MAX:100}
lendas.cache.vocabularies.ttl-seconds=${LENDAS_CACHE_VOCABULARIES_TTL:14400}
lendas.cache.vocabularies.max-entries=${LENDAS_CACHE_VOCABULARIES_MAX:500}
lendas.cache.data-types.ttl-seconds=${LENDAS_CACHE_DATA_TYPES_TTL:14400}
lendas.cache.data-types.max-entries=${LENDAS_CACHE_DATA_TYPES_MAX:200}
lendas.cache.feature-types.ttl-seconds=${LENDAS_CACHE_FEATURE_TYPES_TTL:14400}
lendas.cache.feature-types.max-entries=${LENDAS_CACHE_FEATURE_TYPES_MAX:200}
