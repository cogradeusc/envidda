logging.level.org.example.lendas=DEBUG

lendas.geoserver.base-url=${LENDAS_GEOSERVER_BASE_URL:http://geoserver:8081/geoserver/ccmm/ows}
lendas.geoserver.wcs-url=${LENDAS_GEOSERVER_WCS_URL:http://geoserver:8081/geoserver/ccmm/wcs}
lendas.geoserver.wms-url=${LENDAS_GEOSERVER_WMS_URL:http://geoserver:8081/geoserver/ccmm/wms}

lendas.security.allowed-origin-patterns=${LENDAS_ALLOWED_ORIGIN_PATTERNS:*}
lendas.security.enable-cache-admin=true

lendas.cache.process-types.ttl-seconds=3600
lendas.cache.process-types.max-entries=100
lendas.cache.vocabularies.ttl-seconds=14400
lendas.cache.vocabularies.max-entries=500
lendas.cache.data-types.ttl-seconds=14400
lendas.cache.data-types.max-entries=200
lendas.cache.feature-types.ttl-seconds=14400
lendas.cache.feature-types.max-entries=200

