version: "3.9"
services:
  app-dev:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /workspace
    command: >
      mvn -q spring-boot:run
      -Dspring-boot.run.profiles=dev
      -Dspring-boot.run.jvmArguments="-Duser.timezone=Europe/Madrid -Dfile.encoding=UTF-8 -Dspring.output.ansi.enabled=ALWAYS"
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      MAVEN_OPTS: "-Xmx1g"
    volumes:
      - ./:/workspace
      - m2:/root/.m2
    ports:
      - "8080:8080"
    networks:
      postgis-network:
        aliases:
          - app-dev
volumes:
  m2:

networks:
  postgis-network:
    external: true
